services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-agentbankz}
      POSTGRES_DB: ${DB_NAME:-agentbankz}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 5s
      retries: 20

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama-data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 30

  ollama-pull:
    image: ollama/ollama:latest
    depends_on:
      ollama:
        condition: service_healthy
    environment:
      OLLAMA_HOST: http://ollama:11434
    command: pull ${EMBEDDINGS_MODEL:-qwen3-embedding:latest}
    restart: "no"

  backend:
    build:
      context: .
      dockerfile: Dockerfile
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
      ollama-pull:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-agentbankz}
      DB_USER: ${DB_USER:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-agentbankz}
      DB_SCHEMA: ${DB_SCHEMA:-public}
      EMBEDDINGS_MODEL: ${EMBEDDINGS_MODEL:-qwen3-embedding:latest}
      OLLAMA_BASE_URL: http://ollama:11434
      SERVER_HOST: 0.0.0.0
      SERVER_PORT: 8123
      LANGGRAPH_DEPLOYMENT_URL: http://localhost:8123
    ports:
      - "8123:8123"
    volumes:
      - agentbankz-data:/app/data

  frontend:
    build:
      context: ./deep-agents-ui
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_LANGGRAPH_DEPLOYMENT_URL: http://localhost:8123
        NEXT_PUBLIC_ASSISTANT_ID: sample_agent
        NEXT_PUBLIC_LANGSMITH_API_KEY: ${NEXT_PUBLIC_LANGSMITH_API_KEY:-}
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_LANGGRAPH_DEPLOYMENT_URL: http://localhost:8123
      NEXT_PUBLIC_ASSISTANT_ID: sample_agent
      NEXT_PUBLIC_LANGSMITH_API_KEY: ${NEXT_PUBLIC_LANGSMITH_API_KEY:-}
    ports:
      - "3000:3000"

volumes:
  postgres-data:
  ollama-data:
  agentbankz-data:
